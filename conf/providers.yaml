schema_version: 1

providers:
  deepseek-api:
    type: api
    protocol: openai-compatible
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    options:
      endpoint_path: /chat/completions
      structured_output_mode: none
      max_output_tokens_field: max_tokens
      reasoning_field: reasoning_effort
      timeout_ms: 120000
      extra_body:
        response_format:
          type: json_object
        thinking:
          # 可改为 disabled 关闭思考模式。
          type: enabled
        # 可选：按业务维度隔离调度与 KVCache。不要填写用户隐私。
        # user_id: til-consensus
    models:
      default:
        provider_model: deepseek-v4-pro
        max_output_tokens: 4096
        # DeepSeek OpenAI 格式支持 high / max。
        reasoning: max

  gemini-api:
    type: api
    protocol: gemini-api
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    options:
      endpoint_path: /models/{model}:generateContent
      response_mime_type: application/json
      response_schema_field: response_json_schema
      timeout_ms: 120000
    models:
      default:
        provider_model: gemini-3.5-flash
        max_output_tokens: 4096
        temperature: 0.2
        reasoning: medium

  qwen-max-api:
    type: api
    protocol: openai-compatible
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_env: BAILIAN_API_KEY
    options:
      endpoint_path: /chat/completions
      structured_output_mode: none
      max_output_tokens_field: max_tokens
      reasoning_field: "-"
      timeout_ms: 120000
      extra_body:
        response_format:
          type: json_object
        # 可改为 false 关闭百炼兼容模式的思考输出。
        enable_thinking: true
    models:
      default:
        provider_model: qwen3.7-max
        max_output_tokens: 4096

schema_version: 1

# Agents used by delphi mode.
agents:
  - id: participant-gemini-api
    provider: gemini-api
    model: default
    role: participant
  - id: participant-deepseek-api
    provider: deepseek-api
    model: default
    role: participant
  - id: participant-dashscope-api
    provider: dashscope-api
    model: default
    role: participant
  - id: facilitator-gemini-api
    provider: gemini-api
    model: default
    role: facilitator
  - id: reporter-dashscope-api
    provider: dashscope-api
    model: default
    role: reporter

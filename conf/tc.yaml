schema_version: 1

include:
  - ./providers.yaml
  - ./agents-adjudication.yaml
  - ./agents-free-debate.yaml
  - ./agents-delphi.yaml
  - ./roles-adjudication.yaml
  - ./roles-free-debate.yaml
  - ./roles-delphi.yaml

profile: adjudication

defaults:
  per_task_timeout: 20m
  task_retry_attempts: 2
  proposal_policy:
    max_passes: 1
    max_claims_per_worker: 4
    dedupe_strategy: normalized-statement
  verification_policy:
    allow_semantic_verifier: true
    max_parallel_checks: 2
  arbiter_policy:
    allow_undetermined: true
    blind_review: true
  debate_policy:
    min_rounds: 2
    max_rounds: 3
    vote_threshold: 0.67
    enable_early_stop: true
    peer_context_mode: summary+active_claims
    semantic_dedup:
      enabled: true
      similarity_threshold: 0.85
  delphi_policy:
    min_rounds: 2
    max_rounds: 3
    convergence_threshold: 0.78
    rating_scale_min: 1
    rating_scale_max: 5
    anonymous: true
    facilitator_summary_style: anonymous-aggregate

output:
  directory: ./out/{requestId}

profiles:
  adjudication:
    defaults:
      mode: adjudication
      success_criteria:
        - 每条关键 claim 必须给出 claim 级裁决
        - 必须标注 keep、revise、reject 或 unresolved 的裁决状态
        - 必须输出关键 caveat、证据缺口和最终 task verdict
  free-debate:
    defaults:
      mode: free_debate
      success_criteria:
        - 必须呈现主要支持方和反对方观点
        - 必须记录每轮关键分歧、观点变化和未解决冲突
        - 必须输出最终投票结果、少数意见和 unresolved 分歧
  delphi:
    defaults:
      mode: delphi
      success_criteria:
        - 必须进行匿名多轮评分或意见修订
        - 必须输出每轮共识变化、收敛程度和分歧摘要
        - 必须明确最终共识、未收敛问题和下一步建议

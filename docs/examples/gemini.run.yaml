# 搭配 gemini.config.yaml
request_id: gemini-freshness-001

task_spec:
  goal: 判断“新 SDK 已在全部地区完成发布”这一说法是否仍然可靠
  task_type: factual
  success_criteria:
    - 必须考虑 freshness
    - 必须识别来源冲突
    - 证据不足时允许 undetermined
  materials:
    - id: release-note
      title: 发布说明
      kind: text
      content: |
        过去的发布说明写道：新 SDK 已在全部地区完成发布。
    - id: current-question
      title: 当前问题
      kind: text
      content: |
        需要确认该说法在今天是否仍然成立。

roles:
  proposers: [proposer-gemini]
  challengers: [challenger-gemini]
  arbiter: arbiter-gemini
  semantic_verifier: verifier-gemini
  reporter: reporter-gemini

proposal_policy:
  max_passes: 1
  max_claims_per_worker: 4

verification_policy:
  allow_semantic_verifier: true
  max_parallel_checks: 2

ingest_policy:
  sources:
    - name: latest-release-state
      command: sh
      args:
        - -c
        - cat ./sources/latest-release.yaml
      parsing:
        mode: yaml
        required_paths:
          - report.summary
        summary_path: report.summary
        excerpt_path: report.excerpt
        metadata_paths:
          publishedAt: report.publishedAt

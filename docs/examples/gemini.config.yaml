schema_version: 1

defaults:
  success_criteria:
    - 给出 claim 级裁决
    - 把证据不足的部分明确标成 undetermined
  per_task_timeout: 20m
  task_retry_attempts: 1
  proposal_policy:
    max_passes: 1
    max_claims_per_worker: 4
    dedupe_strategy: normalized-statement
  verification_policy:
    allow_semantic_verifier: true
    max_parallel_checks: 2
  arbiter_policy:
    allow_undetermined: true
    blind_review: true

output:
  directory: ./out/{requestId}

providers:
  gemini-cli:
    type: cli
    cli_type: gemini
    command: gemini
    models:
      default:
        provider_model: gemini-3.1-pro-preview
        reasoning: medium

agents:
  - id: proposer-gemini
    provider: gemini-cli
    model: default
    role: proposer
  - id: challenger-gemini
    provider: gemini-cli
    model: default
    role: challenger
  - id: verifier-gemini
    provider: gemini-cli
    model: default
    role: semantic-verifier
  - id: arbiter-gemini
    provider: gemini-cli
    model: default
    role: arbiter
  - id: reporter-gemini
    provider: gemini-cli
    model: default
    role: reporter

roles:
  proposers: [proposer-gemini]
  challengers: [challenger-gemini]
  semantic_verifier: verifier-gemini
  arbiter: arbiter-gemini
  reporter: reporter-gemini

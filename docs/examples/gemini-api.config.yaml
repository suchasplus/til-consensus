schema_version: 1

defaults:
  success_criteria:
    - 给出 claim 级裁决
    - 输出关键 caveat 与 unresolved
  per_task_timeout: 20m
  task_retry_attempts: 1
  proposal_policy:
    max_passes: 1
    max_claims_per_worker: 4
    dedupe_strategy: normalized-statement
  verification_policy:
    allow_semantic_verifier: true
    max_parallel_checks: 2
  arbiter_policy:
    allow_undetermined: true
    blind_review: true

output:
  directory: ./out/{requestId}

providers:
  gemini-api:
    type: api
    protocol: gemini-api
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    options:
      endpoint_path: /models/{model}:generateContent
      response_mime_type: application/json
      response_schema_field: response_json_schema
      timeout_ms: 120000
    models:
      default:
        provider_model: gemini-2.5-flash
        max_output_tokens: 4096
        temperature: 0.2
        reasoning: medium

agents:
  - id: proposer-gemini-api
    provider: gemini-api
    model: default
    role: proposer
  - id: challenger-gemini-api
    provider: gemini-api
    model: default
    role: challenger
  - id: verifier-gemini-api
    provider: gemini-api
    model: default
    role: semantic-verifier
  - id: arbiter-gemini-api
    provider: gemini-api
    model: default
    role: arbiter
  - id: reporter-gemini-api
    provider: gemini-api
    model: default
    role: reporter

roles:
  proposers: [proposer-gemini-api]
  challengers: [challenger-gemini-api]
  semantic_verifier: verifier-gemini-api
  arbiter: arbiter-gemini-api
  reporter: reporter-gemini-api
